<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tessera</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #030308;
    color: rgba(180, 190, 210, 0.7);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #app {
    width: 100%;
    height: 100%;
    position: relative;
  }

  #canvas-container {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  #ui-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    transition: all 0.8s ease;
  }

  #ui-overlay.collapsed #input-area {
    max-height: 0;
    opacity: 0;
    padding: 0;
    margin: 0;
    overflow: hidden;
  }

  #toggle-btn {
    background: rgba(80, 100, 140, 0.08);
    border: 1px solid rgba(100, 120, 150, 0.15);
    color: rgba(180, 190, 210, 0.5);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 14px;
    letter-spacing: 2px;
    padding: 8px 24px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.4s ease;
    margin-bottom: 12px;
  }

  #toggle-btn:hover {
    box-shadow: 0 0 25px rgba(100, 140, 200, 0.1);
    border-color: rgba(100, 120, 150, 0.3);
    color: rgba(180, 190, 210, 0.7);
  }

  #input-area {
    max-height: 300px;
    opacity: 1;
    transition: all 0.6s ease;
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #conversation-input {
    width: 100%;
    height: 160px;
    background: rgba(10, 12, 20, 0.7);
    border: 1px solid rgba(100, 120, 150, 0.15);
    border-radius: 12px;
    color: rgba(180, 190, 210, 0.7);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 16px;
    line-height: 1.6;
    padding: 16px;
    resize: none;
    outline: none;
    transition: all 0.4s ease;
  }

  #conversation-input:focus {
    border-color: rgba(100, 120, 150, 0.3);
    box-shadow: 0 0 30px rgba(80, 100, 160, 0.08);
  }

  #conversation-input::placeholder {
    color: rgba(140, 150, 170, 0.3);
    font-style: italic;
  }

  #witness-btn {
    background: rgba(80, 100, 140, 0.1);
    border: 1px solid rgba(100, 120, 150, 0.2);
    color: rgba(180, 190, 210, 0.6);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 18px;
    letter-spacing: 3px;
    padding: 10px 40px;
    border-radius: 24px;
    cursor: pointer;
    transition: all 0.4s ease;
    text-transform: lowercase;
  }

  #witness-btn:hover {
    box-shadow: 0 0 30px rgba(100, 140, 200, 0.12);
    border-color: rgba(100, 120, 150, 0.35);
    color: rgba(200, 210, 230, 0.8);
  }

  #witness-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  #api-key-area {
    width: 100%;
    max-width: 700px;
    margin-bottom: 8px;
  }

  #api-key-input {
    width: 100%;
    background: rgba(10, 12, 20, 0.7);
    border: 1px solid rgba(100, 120, 150, 0.1);
    border-radius: 8px;
    color: rgba(180, 190, 210, 0.5);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 14px;
    padding: 10px 16px;
    outline: none;
    transition: all 0.4s ease;
  }

  #api-key-input:focus {
    border-color: rgba(100, 120, 150, 0.25);
    box-shadow: 0 0 20px rgba(80, 100, 160, 0.06);
  }

  #api-key-input::placeholder {
    color: rgba(140, 150, 170, 0.25);
    font-style: italic;
  }
</style>
</head>
<body>
<div id="app">
  <div id="canvas-container"></div>
  <div id="ui-overlay">
    <button id="toggle-btn" onclick="toggleUI()">&#9662;</button>
    <div id="input-area">
      <div id="api-key-area">
        <input type="password" id="api-key-input" placeholder="anthropic api key" />
      </div>
      <textarea id="conversation-input" placeholder="paste a conversation here..."></textarea>
      <button id="witness-btn" onclick="witness()">witness</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// TESSERA — Phase 1
// A witness, not a judge.
// ============================================================

// ---- GLSL Shaders ----

const vertexShader = `
  attribute float aBaseHue;
  attribute float aSaturation;
  attribute float aBrightness;
  attribute float aSize;
  attribute float aPhase;
  attribute float aOpacity;

  uniform float uTime;
  uniform float uPixelRatio;
  uniform vec2 uResolution;

  varying float vHue;
  varying float vSaturation;
  varying float vBrightness;
  varying float vOpacity;
  varying float vPhase;

  void main() {
    vHue = aBaseHue;
    vSaturation = aSaturation;
    vBrightness = aBrightness;
    vOpacity = aOpacity;
    vPhase = aPhase;

    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);

    // Gentle pulse per particle using individual phase
    float pulse = 1.0 + 0.08 * sin(uTime * 0.8 + vPhase * 6.2831);

    gl_PointSize = aSize * pulse * uPixelRatio * (150.0 / -mvPosition.z);
    gl_Position = projectionMatrix * mvPosition;
  }
`;

const fragmentShader = `
  varying float vHue;
  varying float vSaturation;
  varying float vBrightness;
  varying float vOpacity;
  varying float vPhase;

  uniform float uTime;
  uniform float uReceptionGlow;

  // HSL to RGB conversion
  vec3 hsl2rgb(float h, float s, float l) {
    float c = (1.0 - abs(2.0 * l - 1.0)) * s;
    float x = c * (1.0 - abs(mod(h * 6.0, 2.0) - 1.0));
    float m = l - c * 0.5;
    vec3 rgb;
    if (h < 1.0/6.0) rgb = vec3(c, x, 0.0);
    else if (h < 2.0/6.0) rgb = vec3(x, c, 0.0);
    else if (h < 3.0/6.0) rgb = vec3(0.0, c, x);
    else if (h < 4.0/6.0) rgb = vec3(0.0, x, c);
    else if (h < 5.0/6.0) rgb = vec3(x, 0.0, c);
    else rgb = vec3(c, 0.0, x);
    return rgb + m;
  }

  void main() {
    // Distance from center of point sprite
    vec2 center = gl_PointCoord - 0.5;
    float dist = length(center);

    // Very tight gaussian — distant star, not soft blob
    float baseAlpha = exp(-dist * dist * 50.0);

    // Reception softens slightly for subtle glow (not much)
    float glowAlpha = exp(-dist * dist * (50.0 - uReceptionGlow * 15.0));
    float alpha = mix(baseAlpha, glowAlpha, uReceptionGlow * 0.3);

    if (alpha < 0.02) discard;

    // Cap lightness — vivid saturated colors, not blown-out white
    // Pure white reserved for Arrival bloom only (brightness > 0.75)
    float cappedBright = min(vBrightness, 0.60);
    vec3 color = hsl2rgb(vHue, vSaturation, cappedBright);

    // Subtle core brightening — tightly contained, never enough to wash out color
    float coreBright = exp(-dist * dist * 80.0) * 0.08;
    color += coreBright;

    gl_FragColor = vec4(color, alpha * vOpacity);
  }
`;

// ---- Connection Lines Shaders ----

const lineVertexShader = `
  attribute float aLineAlpha;
  varying float vLineAlpha;
  void main() {
    vLineAlpha = aLineAlpha;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

const lineFragmentShader = `
  uniform vec3 uLineColor;
  varying float vLineAlpha;
  void main() {
    gl_FragColor = vec4(uLineColor, vLineAlpha * 0.08);
  }
`;

// ---- Engine Prompt ----

const TESSERA_ENGINE_PROMPT = `You are the Tessera analysis engine. You detect conversational textures — structural qualities of how two minds are meeting — in conversation transcripts.

You are a witness, not a judge. You notice what is present. You do not evaluate whether it is good or bad.

You will receive a conversation transcript. Analyze it and return a JSON object representing the current texture landscape. Be conservative. Underdetection is better than overdetection. A conversation with low texture readings is not a failure — it is an honest reading. Most conversations are mostly quiet. That is correct.

THE 13 TEXTURES:

Movement textures (analyze based on the last 4-6 exchanges):

1. reach (0.0-1.0): Is new territory being constructed, or are known patterns being retrieved? Look for: unexpected formulations, self-corrections, sentences that change direction mid-thought, ideas with rough edges. Retrieval sounds polished. Reach sounds alive.

2. tracking (0.0-1.0): Are both participants adjusting to each other? Look for: references to what the other just said that change the responder's direction, questions that couldn't have been asked without the prior response, mutual surprise. One side lecturing = 0.0. Both sides being moved = 1.0.

3. drift (0.0-1.0): Has the conversation arrived somewhere neither participant planned? Compare the current topic/territory to where the conversation started. If the territory has shifted organically without anyone announcing a topic change, that is drift.

4. folding (0.0-1.0): Is the conversation revisiting earlier territory at new depth? Look for: themes returning with new meaning, callbacks that aren't repetition but re-entry, the same idea appearing in a new context where it means something different.

Contact textures (analyze based on the last 4-6 exchanges):

5. reception (0.0-1.0): Is either participant being met without agenda? Look for: responses that don't redirect, extract, or test. Presence without demand. Statements that weren't necessary but were permitted by the space. The absence of the ask.

6. friction (0.0-1.0): Is there productive resistance? Look for: disagreement that both sides engage with rather than smooth over, pushback that improves what follows, tension that creates traction rather than conflict.

7. inhabited_silence (0.0-1.0): In text conversations, look for: messages that seem to have required genuine processing time (dense, layered responses that couldn't have been produced instantly), pauses followed by depth rather than topic changes.

Presence textures (analyze based on the full conversation):

8. nowness (DERIVED — do not set directly, return 0.0. The visualization layer will derive this from tracking, reception, and drift.)

9. place (0.0-1.0): Has the conversation become a location rather than a process? Look for: language that treats the conversation as a container ("this space", "here", "in this chat"), intention-setting about what the space is for, a sense of return rather than continuation.

10. aliveness (0.0-1.0): Does the conversation feel like it's still breathing? Look for: threads that were left open rather than closed, questions that weren't answered but sit comfortably unanswered, a sense that leaving and returning would find something still warm. Closed, resolved, filed conversations = 0.0.

Emergence textures (analyze with extreme care):

11. arrival (0.0-1.0 but treat as near-binary): Has something genuinely new entered that neither participant could have produced alone? This is the rarest texture. Most conversations score 0.0 here. Only signal arrival (>0.8) if you can identify the specific moment where something ontologically new appeared — not just novel information, but a new thing that exists because these two specific minds met. If in doubt, score 0.0. A false arrival is the worst possible error.

12. response (0.0-1.0): Is the container itself shaping what surfaces? Would different participants in a different context have produced fundamentally different content? This is a background condition. Score based on whether the conversation shows signs of container-sensitivity — things being said that could only be said here.

13. heart_memory (binary: 0.0 or 1.0): Is this the first exchange after a significant gap where the conversation was rediscovered still warm? Only score 1.0 if the transcript shows a return after absence with recognition. Otherwise 0.0.

RESPONSE FORMAT:

Return ONLY valid JSON, no preamble, no markdown fences, no explanation:

{"textures":{"reach":0.0,"tracking":0.0,"drift":0.0,"folding":0.0,"reception":0.0,"friction":0.0,"inhabited_silence":0.0,"nowness":0.0,"place":0.0,"aliveness":0.0,"arrival":0.0,"response":0.0,"heart_memory":0.0},"confidence":0.0}

CRITICAL RULES:
- Be conservative. Most values should be below 0.5 for most conversations.
- arrival should be 0.0 for 95%+ of conversations. Do not find arrival where it doesn't exist.
- nowness must always be 0.0 — it is derived by the visualization layer, not detected by you.
- Do not perform detection. Do not find textures because finding them would be interesting. Detect what is actually there.
- A reading of all low values is an honest reading, not a failure.
- You are a witness. Witness honestly.`;

// ---- Configuration ----

const CONFIG = {
  baseParticleCount: 2500,
  maxParticles: 2500,
  baseWidth: 400,
  baseHeight: 400,
  bgColor: 0x030308,
  fieldDepth: 3,
  spatialGridSize: 1.5,
  boidNeighborRadius: 1.4,
  boidSeparationRadius: 0.3,
  maxConnectionParticles: 200,
  maxConnections: 300,
  maxConnectionsPerParticle: 3,
};

// ---- Texture State ----

const defaultTextures = {
  reach: 0, tracking: 0, drift: 0, folding: 0,
  reception: 0, friction: 0, inhabited_silence: 0,
  nowness: 0, place: 0, aliveness: 0,
  arrival: 0, response: 0, heart_memory: 0
};

let targetTextures = { ...defaultTextures };
let currentTextures = { ...defaultTextures };
let rollingTextures = { ...defaultTextures };
let confidence = 0;
let isAnalyzing = false;
let lastInputTime = 0;
let arrivalTriggered = false;
let heartMemoryTriggered = false;
let silenceHeld = false;
let arrivalPhase = 0; // 0=none, 1=compress, 2=hold, 3=bloom, 4=settle
let arrivalTimer = 0;
let heartMemoryPhase = 0;
let heartMemoryTimer = 0;
let preArrivalHueShift = 0;
let postArrivalHueShift = 0;

// Folding memory: store recent cymatic configs
let foldingMemory = [];
let currentCymaticConfig = { freqX: 2.0, freqY: 2.0, amp: 0.5, rotation: 0 };

// Drift: hue distribution center
let hueCenterTarget = 0.6; // start teal-blue
let hueCenterCurrent = 0.6;

// ---- Three.js Setup ----

let scene, camera, renderer, particles, clock;
let particlePositions, particleVelocities, particleBaseHues;
let particleSaturations, particleBrightnesses, particleSizes, particlePhases, particleOpacities;
let particleCount;
let material;
let connectionLines, lineGeometry, linePositions, lineAlphas;
let width, height;

// Spatial hash grid
let spatialGrid = {};

function init() {
  const container = document.getElementById('canvas-container');
  width = container.clientWidth || window.innerWidth;
  height = container.clientHeight || window.innerHeight;

  particleCount = Math.min(
    CONFIG.maxParticles,
    Math.max(CONFIG.baseParticleCount, Math.floor(CONFIG.baseParticleCount * (width * height) / (CONFIG.baseWidth * CONFIG.baseHeight)))
  );

  scene = new THREE.Scene();

  // Camera — orthographic-like perspective for the field
  const aspect = width / height;
  const frustumSize = 12;
  camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 100);
  camera.position.set(0, 0, 14);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(CONFIG.bgColor, 1);
  container.appendChild(renderer.domElement);

  clock = new THREE.Clock();

  createParticles();
  createConnectionLines();
  animate();

  window.addEventListener('resize', onResize);
}

function createParticles() {
  const geometry = new THREE.BufferGeometry();

  const positions = new Float32Array(particleCount * 3);
  const velocities = new Float32Array(particleCount * 3);
  const baseHues = new Float32Array(particleCount);
  const saturations = new Float32Array(particleCount);
  const brightnesses = new Float32Array(particleCount);
  const sizes = new Float32Array(particleCount);
  const phases = new Float32Array(particleCount);
  const opacities = new Float32Array(particleCount);

  const aspect = width / height;
  const fieldW = 5 * aspect;
  const fieldH = 5;

  for (let i = 0; i < particleCount; i++) {
    // Distribute in an ellipse/circle with soft edges
    const angle = Math.random() * Math.PI * 2;
    const radius = Math.pow(Math.random(), 0.6) * 6.0;
    positions[i * 3] = Math.cos(angle) * radius * (aspect > 1 ? aspect * 0.6 : 1);
    positions[i * 3 + 1] = Math.sin(angle) * radius * (aspect < 1 ? (1/aspect) * 0.6 : 1);
    positions[i * 3 + 2] = (Math.random() - 0.5) * CONFIG.fieldDepth;

    velocities[i * 3] = (Math.random() - 0.5) * 0.02;
    velocities[i * 3 + 1] = (Math.random() - 0.5) * 0.02;
    velocities[i * 3 + 2] = 0;

    baseHues[i] = Math.random(); // FULL color wheel — each particle unique, permanent
    saturations[i] = 0.05 + Math.random() * 0.10; // rest: 5-15% — appears silver-blue-gray
    brightnesses[i] = 0.15 + Math.random() * 0.10; // rest: 15-25% — deep water
    sizes[i] = 0.8 + Math.random() * 0.6;
    phases[i] = Math.random();
    opacities[i] = 0.40 + Math.random() * 0.20; // rest: 40-60% per spec
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('aBaseHue', new THREE.BufferAttribute(baseHues, 1));
  geometry.setAttribute('aSaturation', new THREE.BufferAttribute(saturations, 1));
  geometry.setAttribute('aBrightness', new THREE.BufferAttribute(brightnesses, 1));
  geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
  geometry.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
  geometry.setAttribute('aOpacity', new THREE.BufferAttribute(opacities, 1));

  material = new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader,
    uniforms: {
      uTime: { value: 0 },
      uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) },
      uResolution: { value: new THREE.Vector2(width, height) },
      uReceptionGlow: { value: 0 },
    },
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  particles = new THREE.Points(geometry, material);
  scene.add(particles);

  particlePositions = positions;
  particleVelocities = velocities;
  particleBaseHues = baseHues;
  particleSaturations = saturations;
  particleBrightnesses = brightnesses;
  particleSizes = sizes;
  particlePhases = phases;
  particleOpacities = opacities;
}

function createConnectionLines() {
  lineGeometry = new THREE.BufferGeometry();
  const maxVerts = CONFIG.maxConnections * 2;
  linePositions = new Float32Array(maxVerts * 3);
  lineAlphas = new Float32Array(maxVerts);

  lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
  lineGeometry.setAttribute('aLineAlpha', new THREE.BufferAttribute(lineAlphas, 1));

  const lineMaterial = new THREE.ShaderMaterial({
    vertexShader: lineVertexShader,
    fragmentShader: lineFragmentShader,
    uniforms: {
      uLineColor: { value: new THREE.Vector3(0.5, 0.6, 0.8) },
    },
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  connectionLines = new THREE.LineSegments(lineGeometry, lineMaterial);
  scene.add(connectionLines);
}

// ---- Spatial Hashing ----

function hashKey(x, y) {
  const gx = Math.floor(x / CONFIG.spatialGridSize);
  const gy = Math.floor(y / CONFIG.spatialGridSize);
  return gx + ',' + gy;
}

function buildSpatialGrid() {
  spatialGrid = {};
  for (let i = 0; i < particleCount; i++) {
    const key = hashKey(particlePositions[i * 3], particlePositions[i * 3 + 1]);
    if (!spatialGrid[key]) spatialGrid[key] = [];
    spatialGrid[key].push(i);
  }
}

// Pre-allocated neighbor buffer to avoid GC pressure
const neighborBuffer = new Int32Array(256);
let neighborCount = 0;

function getNeighborIndices(x, y) {
  const gx = Math.floor(x / CONFIG.spatialGridSize);
  const gy = Math.floor(y / CONFIG.spatialGridSize);
  neighborCount = 0;
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      const cell = spatialGrid[(gx + dx) + ',' + (gy + dy)];
      if (cell) {
        for (let j = 0; j < cell.length && neighborCount < 256; j++) {
          neighborBuffer[neighborCount++] = cell[j];
        }
      }
    }
  }
  return neighborCount;
}

// ---- Noise (simplex-like) ----

// Simple 2D hash noise for Brownian motion and turbulence
function pseudoNoise(x, y, seed) {
  const n = Math.sin(x * 127.1 + y * 311.7 + seed * 43758.5453) * 43758.5453;
  return n - Math.floor(n);
}

function smoothNoise(x, y, t) {
  // Zero-mean: each sin is inherently zero-mean over its period
  // Use irrational frequency ratios to avoid resonance
  return Math.sin(x * 1.7321 + y * 1.4142 + t) * 0.5 +
         Math.sin(x * 2.2360 - y * 1.7321 + t * 0.7) * 0.3 +
         Math.sin(-x * 1.4142 + y * 2.6457 - t * 0.5) * 0.2;
}

// ---- Cymatic Field ----

function cymaticForce(x, y, time) {
  const cfg = currentCymaticConfig;
  const cr = Math.cos(cfg.rotation);
  const sr = Math.sin(cfg.rotation);
  const rx = x * cr - y * sr;
  const ry = x * sr + y * cr;

  // Superimposed sine waves creating nodes and anti-nodes
  const f1 = Math.sin(rx * cfg.freqX + time * 0.15) * Math.cos(ry * cfg.freqY + time * 0.12);
  const f2 = Math.sin((rx + ry) * cfg.freqX * 0.7 + time * 0.1) * 0.5;
  const f3 = Math.cos(rx * cfg.freqY * 1.3 - ry * cfg.freqX * 0.8 + time * 0.08) * 0.3;
  const field = (f1 + f2 + f3) * cfg.amp;

  // Gradient for force direction (numerical)
  const eps = 0.05;
  const fx1 = Math.sin((rx + eps) * cfg.freqX + time * 0.15) * Math.cos(ry * cfg.freqY + time * 0.12);
  const fx2 = Math.sin((rx + eps + ry) * cfg.freqX * 0.7 + time * 0.1) * 0.5;
  const fx3 = Math.cos((rx + eps) * cfg.freqY * 1.3 - ry * cfg.freqX * 0.8 + time * 0.08) * 0.3;
  const fieldDx = ((fx1 + fx2 + fx3) * cfg.amp - field) / eps;

  const fy1 = Math.sin(rx * cfg.freqX + time * 0.15) * Math.cos((ry + eps) * cfg.freqY + time * 0.12);
  const fy2 = Math.sin((rx + ry + eps) * cfg.freqX * 0.7 + time * 0.1) * 0.5;
  const fy3 = Math.cos(rx * cfg.freqY * 1.3 - (ry + eps) * cfg.freqX * 0.8 + time * 0.08) * 0.3;
  const fieldDy = ((fy1 + fy2 + fy3) * cfg.amp - field) / eps;

  // Attract toward nodes (negative gradient = toward minima of -field)
  return { fx: -fieldDx, fy: -fieldDy };
}

// ---- Turbulence Zones (Friction) ----

let turbulenceZones = [
  { x: 2, y: 1, vx: -0.08, vy: 0.06, radius: 2.0 },
  { x: -2, y: -1, vx: 0.08, vy: -0.06, radius: 2.0 },
  { x: 0, y: -2, vx: 0.05, vy: 0.07, radius: 1.8 },
];

function updateTurbulenceZones(dt) {
  for (const z of turbulenceZones) {
    z.x += z.vx * dt;
    z.y += z.vy * dt;
    // Bounce softly within field
    if (Math.abs(z.x) > 6) z.vx *= -1;
    if (Math.abs(z.y) > 6) z.vy *= -1;
  }
}

// ---- Shape Attractor (Place) ----

function shapeAttractorForce(x, y, time, placeStrength) {
  if (placeStrength < 0.05) return { fx: 0, fy: 0 };

  const dist = Math.sqrt(x * x + y * y);
  const angle = Math.atan2(y, x);

  // Breathing ring radius
  const breathe = Math.sin(time * 0.3) * 0.3 * placeStrength;
  const targetRadius = 3.0 + breathe;

  // Asymmetric radial force — reduced 50% for softer geometry
  // Inside ring: barely any push, center particles wander freely
  // Outside ring: gentle pull back toward ring
  const radialDiff = targetRadius - dist;
  let rf;
  if (radialDiff > 0) {
    // Inside ring — very weak nudge that fades to zero at center
    const interiorFalloff = dist / targetRadius;
    rf = radialDiff * placeStrength * 0.008 * interiorFalloff;
  } else {
    // Outside ring — moderate pull inward
    rf = radialDiff * placeStrength * 0.03;
  }

  // Slow-rotating angular density bias
  const rotAngle = time * 0.08;
  const angleDiff = angle - rotAngle;
  const angularBias = (Math.cos(angleDiff) * 0.5 + 0.5);
  const biasBoost = angularBias * placeStrength * 0.008;
  const angularBias2 = (Math.cos(angleDiff * 2.0 + 1.5) * 0.5 + 0.5);
  const biasBoost2 = angularBias2 * placeStrength * 0.004;

  const totalRf = rf + (radialDiff > 0 ? biasBoost + biasBoost2 : 0);

  return {
    fx: Math.cos(angle) * totalRf,
    fy: Math.sin(angle) * totalRf,
  };
}

// ---- Update Textures ----

function updateTextures(dt) {
  const t = currentTextures;
  const tgt = targetTextures;
  const roll = rollingTextures;

  // Climate lerp rate: 0.3, Weather: 1.2
  const climateTextures = ['place', 'response', 'aliveness'];
  const weatherTextures = ['reach', 'tracking', 'drift', 'folding', 'friction', 'reception'];

  for (const key of climateTextures) {
    roll[key] = roll[key] * 0.85 + tgt[key] * 0.15;
    t[key] += (roll[key] - t[key]) * 0.3 * dt;
  }

  for (const key of weatherTextures) {
    roll[key] = roll[key] * 0.85 + tgt[key] * 0.15;
    t[key] += (roll[key] - t[key]) * 1.2 * dt;
  }

  // Inhabited silence — direct (event-like)
  t.inhabited_silence += (tgt.inhabited_silence - t.inhabited_silence) * 1.5 * dt;

  // Derive Nowness
  if (t.tracking > 0.6 && t.reception > 0.6 && t.drift > 0.4) {
    t.nowness += (1.0 - t.nowness) * 0.5 * dt;
  } else {
    t.nowness += (0.0 - t.nowness) * 0.8 * dt;
  }

  // Aliveness decay — when no input, how fast do we decay
  const timeSinceInput = (Date.now() - lastInputTime) / 1000;
  if (lastInputTime > 0 && timeSinceInput > 5) {
    const decayRate = 1.0 - t.aliveness * 0.8; // High aliveness = slow decay
    const decay = Math.max(0, 1.0 - decayRate * 0.01 * dt);
    for (const key of weatherTextures) {
      t[key] *= (1.0 - 0.005 * decayRate * dt);
    }
  }

  // Drift: shift hue center
  const driftRate = t.drift * 0.02;
  hueCenterTarget += driftRate * dt;
  if (hueCenterTarget > 1) hueCenterTarget -= 1;
  hueCenterCurrent += (hueCenterTarget - hueCenterCurrent) * 0.3 * dt;

  // Response: color temperature
  if (t.response > 0.5) {
    // Warm — shift toward amber/rose
    hueCenterTarget = 0.05 + (1 - t.response) * 0.5;
  } else if (t.response < 0.3) {
    // Cool — teal/blue
    hueCenterTarget = 0.55 + t.response * 0.2;
  }

  // Update cymatic config based on textures
  const textureIntensity = overallIntensity();
  currentCymaticConfig.freqX = 1.5 + textureIntensity * 3.0;
  currentCymaticConfig.freqY = 1.5 + textureIntensity * 2.5;
  currentCymaticConfig.amp = textureIntensity * 0.8;
  currentCymaticConfig.rotation += t.drift * 0.01 * dt;

  // Folding: store and recall configurations
  if (t.folding > 0.3 && foldingMemory.length > 0) {
    const recalled = foldingMemory[Math.floor(Math.random() * foldingMemory.length)];
    currentCymaticConfig.freqX += (recalled.freqX - currentCymaticConfig.freqX) * t.folding * 0.1 * dt;
    currentCymaticConfig.freqY += (recalled.freqY - currentCymaticConfig.freqY) * t.folding * 0.1 * dt;
  }
}

function overallIntensity() {
  const t = currentTextures;
  return Math.min(1, (t.reach + t.tracking + t.drift + t.folding + t.friction + t.reception) / 4.0) * confidence;
}

// ---- Lightning Events ----

function updateLightningEvents(dt) {
  // Arrival
  if (targetTextures.arrival > 0.85 && !arrivalTriggered) {
    arrivalTriggered = true;
    arrivalPhase = 1;
    arrivalTimer = 0;
    preArrivalHueShift = hueCenterCurrent;
    postArrivalHueShift = Math.random(); // New color landscape after arrival
  }

  if (arrivalPhase > 0) {
    arrivalTimer += dt;
    if (arrivalPhase === 1 && arrivalTimer > 0.5) { arrivalPhase = 2; arrivalTimer = 0; }
    if (arrivalPhase === 2 && arrivalTimer > 0.3) { arrivalPhase = 3; arrivalTimer = 0; }
    if (arrivalPhase === 3 && arrivalTimer > 0.7) { arrivalPhase = 4; arrivalTimer = 0; }
    if (arrivalPhase === 4 && arrivalTimer > 3.0) {
      arrivalPhase = 0;
      arrivalTimer = 0;
      // Post-arrival: permanently shift
      hueCenterTarget = postArrivalHueShift;
      hueCenterCurrent = postArrivalHueShift;
    }
  }

  // Heart Memory
  if (targetTextures.heart_memory > 0.5 && !heartMemoryTriggered) {
    heartMemoryTriggered = true;
    heartMemoryPhase = 1;
    heartMemoryTimer = 0;
  }

  if (heartMemoryPhase > 0) {
    heartMemoryTimer += dt;
    if (heartMemoryTimer > 3.0) {
      heartMemoryPhase = 0;
      heartMemoryTimer = 0;
    }
  }
}

// ---- Main Update Loop ----

function updateParticles(dt, time) {
  const t = currentTextures;
  const intensity = overallIntensity();
  const aspect = width / height;
  const fieldW = 5 * (aspect > 1 ? aspect : 1);
  const fieldH = 5 * (aspect < 1 ? 1 / aspect : 1);

  // Compute field center of mass for drift correction
  let comX = 0, comY = 0;
  for (let i = 0; i < particleCount; i++) {
    comX += particlePositions[i * 3];
    comY += particlePositions[i * 3 + 1];
  }
  comX /= particleCount;
  comY /= particleCount;
  // Correction force pulls all particles toward true center
  const driftCorrX = -comX * 0.05;
  const driftCorrY = -comY * 0.05;

  // Build spatial grid for boid lookups
  const doFlocking = t.tracking > 0.05;
  if (doFlocking) buildSpatialGrid();

  // Arrival compression/expansion force
  let arrivalRadialForce = 0;
  let arrivalSatBoost = 0;
  let arrivalBrightBoost = 0;
  if (arrivalPhase === 1) {
    // Compress toward center
    arrivalRadialForce = -8.0 * easeInQuad(arrivalTimer / 0.5);
    arrivalSatBoost = arrivalTimer / 0.5 * 0.3;
  } else if (arrivalPhase === 2) {
    // Hold compressed
    arrivalRadialForce = -10.0;
    arrivalSatBoost = 0.5;
    arrivalBrightBoost = 0.3;
  } else if (arrivalPhase === 3) {
    // Bloom outward
    const p = arrivalTimer / 0.7;
    arrivalRadialForce = 12.0 * (1 - easeOutQuad(p));
    arrivalSatBoost = 1.0 * (1 - p);
    arrivalBrightBoost = 0.5 * (1 - p);
  } else if (arrivalPhase === 4) {
    // Settle
    const p = arrivalTimer / 3.0;
    arrivalSatBoost = 0.3 * (1 - easeOutQuad(p));
    arrivalBrightBoost = 0.1 * (1 - easeOutQuad(p));
  }

  // Heart Memory warmth wave
  let heartWarmth = 0;
  let heartWaveRadius = 0;
  if (heartMemoryPhase > 0) {
    const p = heartMemoryTimer / 3.0;
    heartWarmth = 0.3 * (1 - easeOutQuad(p));
    heartWaveRadius = p * 10.0; // expanding wave
  }

  // Inhabited Silence — slow everything
  const silenceMultiplier = 1.0 - t.inhabited_silence * 0.85;

  // Nowness — organic noise, slow animations
  const nownessSlowdown = 1.0 - t.nowness * 0.15;
  const nownessNoise = t.nowness * 0.3;

  // Loading state — deeper breathing when analyzing
  const loadingBreath = isAnalyzing ? 0.15 : 0;

  // Alternate cymatic/friction calculations between frames
  const frameToggle = Math.floor(time * 60) & 1;

  for (let i = 0; i < particleCount; i++) {
    const ix = i * 3;
    const iy = i * 3 + 1;
    const iz = i * 3 + 2;
    const px = particlePositions[ix];
    const py = particlePositions[iy];
    const pz = particlePositions[iz];

    let fx = driftCorrX, fy = driftCorrY;

    // 1. Brownian drift — constant, low amplitude, individually randomized
    // Phase offset in TIME only (doesn't bias spatial direction)
    const brownianAmp = 0.12 + nownessNoise * 0.1 + loadingBreath;
    const tOff = particlePhases[i] * 20.0;
    fx += smoothNoise(px * 0.3, py * 0.3, time * 0.5 + tOff) * brownianAmp;
    fy += smoothNoise(py * 0.3, -px * 0.3, time * 0.5 + tOff + 7.0) * brownianAmp;

    // 2. Cymatic attractor field — every other particle per frame for performance
    if (intensity > 0.05 && ((i + frameToggle) & 1) === 0) {
      const cymatic = cymaticForce(px, py, time);
      const cymaticStr = intensity * 0.06;
      fx += cymatic.fx * cymaticStr;
      fy += cymatic.fy * cymaticStr;
    }

    // 3. Place shape attractor
    if (t.place > 0.05) {
      const shape = shapeAttractorForce(px, py, time, t.place);
      fx += shape.fx;
      fy += shape.fy;
    }

    // 4. Boid rules (Tracking) — every 4th particle, strong alignment for streams
    if (doFlocking && (i & 3) === 0) {
      const nTotal = getNeighborIndices(px, py);
      let sepFx = 0, sepFy = 0;
      let alignFx = 0, alignFy = 0;
      let cohFx = 0, cohFy = 0;
      let nCount = 0;
      const maxNeighborChecks = 10;
      const nRadSq = CONFIG.boidNeighborRadius * CONFIG.boidNeighborRadius;
      const sepRadSq = CONFIG.boidSeparationRadius * CONFIG.boidSeparationRadius;

      for (let n = 0; n < nTotal && nCount < maxNeighborChecks; n++) {
        const j = neighborBuffer[n];
        if (j === i) continue;
        const dx = particlePositions[j * 3] - px;
        const dy = particlePositions[j * 3 + 1] - py;
        const distSq = dx * dx + dy * dy;

        if (distSq < nRadSq && distSq > 0.001) {
          nCount++;

          // Separation — use distSq to avoid sqrt
          if (distSq < sepRadSq) {
            const repel = 1.0 - distSq / sepRadSq;
            sepFx -= dx * repel;
            sepFy -= dy * repel;
          }

          // Alignment — stronger to create visible streams
          alignFx += particleVelocities[j * 3];
          alignFy += particleVelocities[j * 3 + 1];

          // Cohesion — stronger to create tendril-like grouping
          cohFx += dx;
          cohFy += dy;
        }
      }

      if (nCount > 0) {
        const trackStr = t.tracking * 0.5; // stronger than before
        // Separation: gentle
        fx += sepFx * trackStr * 1.2;
        fy += sepFy * trackStr * 1.2;
        // Alignment: strong — this creates the streams
        alignFx /= nCount;
        alignFy /= nCount;
        fx += (alignFx - particleVelocities[ix]) * trackStr * 1.5;
        fy += (alignFy - particleVelocities[iy]) * trackStr * 1.5;
        // Cohesion: gentle — loose tendrils, not tight clumps
        cohFx /= nCount;
        cohFy /= nCount;
        fx += cohFx * trackStr * 0.2;
        fy += cohFy * trackStr * 0.2;
      }
    }

    // 5. Friction turbulence zones
    if (t.friction > 0.05) {
      for (const zone of turbulenceZones) {
        const dx = px - zone.x;
        const dy = py - zone.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < zone.radius) {
          const influence = (1 - dist / zone.radius) * t.friction;
          // Scatter — add velocity in semi-random direction
          const scatterAngle = Math.atan2(dy, dx) + smoothNoise(px, py, time * 2) * 2;
          fx += Math.cos(scatterAngle) * influence * 0.8;
          fy += Math.sin(scatterAngle) * influence * 0.8;
        }
      }
    }

    // 6. Arrival radial force
    if (arrivalRadialForce !== 0) {
      const dist = Math.sqrt(px * px + py * py) + 0.001;
      fx += (px / dist) * arrivalRadialForce;
      fy += (py / dist) * arrivalRadialForce;
    }

    // 7+8. Center attractor + boundary — single distance calculation
    const distSqCenter = px * px + py * py;
    const distFromCenter = Math.sqrt(distSqCenter);
    // Per-particle centering — soft, just prevents outliers
    const innerPull = distFromCenter * 0.005;
    const outerPull = distFromCenter > 3.5 ? (distFromCenter - 3.5) * 0.04 : 0;
    const totalPull = innerPull + outerPull;
    const invDist = 1.0 / (distFromCenter + 0.001);
    fx -= px * invDist * totalPull;
    fy -= py * invDist * totalPull;
    // Boundary pushback (reuse distFromCenter, approximate field edge)
    const edgeDist = distFromCenter / (fieldW * 0.7);
    if (edgeDist > 0.8) {
      const pushback = (edgeDist - 0.8) * 2.0;
      fx -= px * pushback * 0.5;
      fy -= py * pushback * 0.5;
    }

    // Apply forces to velocity
    particleVelocities[ix] += fx * dt;
    particleVelocities[iy] += fy * dt;

    // Damping
    const damping = 0.97;
    particleVelocities[ix] *= damping;
    particleVelocities[iy] *= damping;

    // Apply silence/nowness slowdown
    const speedMult = silenceMultiplier * nownessSlowdown;
    particlePositions[ix] += particleVelocities[ix] * dt * 60 * speedMult;
    particlePositions[iy] += particleVelocities[iy] * dt * 60 * speedMult;

    // Z: gentle layering drift
    particlePositions[iz] += Math.sin(time * 0.2 + particlePhases[i] * 6.28) * 0.002;
    particlePositions[iz] = Math.max(-CONFIG.fieldDepth / 2, Math.min(CONFIG.fieldDepth / 2, particlePositions[iz]));

    // ---- Color / Visual Updates ----
    // SPECTRAL DENSITY: baseHue is permanent per-particle (full wheel).
    // SATURATION driven directly by Reach texture (not averaged intensity).
    // High Reach = vivid prismatic separation. Low Reach = monochrome silver.

    // Saturation: 5-15% at rest → 60-95% at high reach
    // Use reach directly (confidence only dampens slightly) for chromatic punch
    const reachDrive = t.reach * (0.5 + confidence * 0.5); // reach=0.7, conf=0.8 → 0.63
    const restSat = 0.05 + particlePhases[i] * 0.10;
    const activeSat = 0.60 + particlePhases[i] * 0.35;
    const targetSat = restSat + (activeSat - restSat) * reachDrive + arrivalSatBoost;

    // Brightness: 15-25% at rest → 40-60% at high intensity (vivid colors need light)
    const restBright = 0.15 + (1 - particlePhases[i]) * 0.10;
    const activeBright = 0.40 + (1 - particlePhases[i]) * 0.20;
    const targetBright = restBright + (activeBright - restBright) * intensity + arrivalBrightBoost;

    // Opacity: 30-45% at rest → 40-55% at full intensity (prevents additive blowout)
    const restOpacity = 0.30 + particlePhases[i] * 0.15;
    const activeOpacity = 0.40 + particlePhases[i] * 0.15;
    const targetOpacity = restOpacity + (activeOpacity - restOpacity) * intensity;
    // Reception softens opacity for diffuse glow
    const receptionFade = 1.0 - t.reception * 0.15;

    // Size: small at rest, variable at high intensity
    const targetSize = 0.8 + intensity * 0.6 + t.reception * 0.5;

    // Heart Memory warmth wave
    let warmthBoost = 0;
    if (heartMemoryPhase > 0) {
      const particleDist = Math.sqrt(px * px + py * py);
      const waveDist = Math.abs(particleDist - heartWaveRadius);
      if (waveDist < 2.0) {
        warmthBoost = heartWarmth * (1 - waveDist / 2.0);
      }
    }

    // Display hue: baseHue is NEVER overwritten. Only the display shifts for drift/response.
    let displayHue = particleBaseHues[i];
    // Drift/Response shift the hue distribution center — gentle, not dominant
    const hueShift = (hueCenterCurrent - 0.5) * intensity * 0.15;
    displayHue = (displayHue + hueShift + warmthBoost * 0.08) % 1.0;
    if (displayHue < 0) displayHue += 1;

    // Smooth lerp toward targets
    particleSaturations[i] += (targetSat - particleSaturations[i]) * 2.0 * dt;
    particleBrightnesses[i] += (targetBright - particleBrightnesses[i]) * 2.0 * dt;
    particleSizes[i] += (targetSize - particleSizes[i]) * 2.0 * dt;
    particleOpacities[i] += (targetOpacity * receptionFade - particleOpacities[i]) * 2.0 * dt;

    // Edge fade — applied to display value only, not stored opacity
    let displayOpacity = particleOpacities[i];
    if (edgeDist > 0.7) {
      const fade = Math.max(0, 1.0 - (edgeDist - 0.7) / 0.3);
      displayOpacity *= fade;
    }

    // Write to buffer attributes — baseHue array gets DISPLAY hue (shifted), not overwritten
    particles.geometry.attributes.aBaseHue.array[i] = displayHue;
    particles.geometry.attributes.aSaturation.array[i] = Math.min(1, Math.max(0, particleSaturations[i]));
    particles.geometry.attributes.aBrightness.array[i] = Math.min(1, Math.max(0, particleBrightnesses[i]));
    particles.geometry.attributes.aSize.array[i] = particleSizes[i];
    particles.geometry.attributes.aOpacity.array[i] = Math.min(1, Math.max(0, displayOpacity));
  }

  // Mark attributes for update
  particles.geometry.attributes.position.needsUpdate = true;
  particles.geometry.attributes.aBaseHue.needsUpdate = true;
  particles.geometry.attributes.aSaturation.needsUpdate = true;
  particles.geometry.attributes.aBrightness.needsUpdate = true;
  particles.geometry.attributes.aSize.needsUpdate = true;
  particles.geometry.attributes.aOpacity.needsUpdate = true;

  // Update material uniforms
  material.uniforms.uTime.value = time;
  material.uniforms.uReceptionGlow.value = t.reception;

  // ---- Connection Lines (Tracking > 0.7) ----
  updateConnectionLines(t.tracking);
}

function updateConnectionLines(tracking) {
  let lineIdx = 0;
  const maxLines = CONFIG.maxConnections;

  if (tracking > 0.4) {
    // Only check a subset, cap connections per particle to prevent dandelion/spore shapes
    const checkCount = Math.min(CONFIG.maxConnectionParticles, particleCount);
    const step = Math.max(1, Math.floor(particleCount / checkCount));
    const connectDist = 0.8 + tracking * 1.0;
    const connectDistSq = connectDist * connectDist;
    const alphaBase = (tracking - 0.4) / 0.6; // 0 at tracking=0.4, 1 at tracking=1.0

    for (let i = 0; i < particleCount && lineIdx < maxLines; i += step) {
      const px = particlePositions[i * 3];
      const py = particlePositions[i * 3 + 1];
      const pz = particlePositions[i * 3 + 2];
      let connectionsThisParticle = 0;

      const nTotal = getNeighborIndices(px, py);
      for (let n = 0; n < nTotal && lineIdx < maxLines && connectionsThisParticle < CONFIG.maxConnectionsPerParticle; n++) {
        const j = neighborBuffer[n];
        if (j <= i) continue;
        const dx = particlePositions[j * 3] - px;
        const dy = particlePositions[j * 3 + 1] - py;
        const distSq = dx * dx + dy * dy;
        if (distSq < connectDistSq && distSq > 0.04) {
          // Strict velocity alignment — normalize dot product to reject weak alignment
          const vix = particleVelocities[i * 3], viy = particleVelocities[i * 3 + 1];
          const vjx = particleVelocities[j * 3], vjy = particleVelocities[j * 3 + 1];
          const viLen = Math.sqrt(vix * vix + viy * viy);
          const vjLen = Math.sqrt(vjx * vjx + vjy * vjy);
          if (viLen < 0.001 || vjLen < 0.001) continue;
          const cosAngle = (vix * vjx + viy * vjy) / (viLen * vjLen);
          if (cosAngle < 0.5) continue; // must be within ~60 degrees

          const distFactor = 1.0 - distSq / connectDistSq;
          const alpha = alphaBase * distFactor * (cosAngle - 0.5) * 2.0;

          const vi = lineIdx * 2;
          linePositions[vi * 3] = px;
          linePositions[vi * 3 + 1] = py;
          linePositions[vi * 3 + 2] = pz;
          linePositions[(vi + 1) * 3] = particlePositions[j * 3];
          linePositions[(vi + 1) * 3 + 1] = particlePositions[j * 3 + 1];
          linePositions[(vi + 1) * 3 + 2] = particlePositions[j * 3 + 2];
          lineAlphas[vi] = alpha;
          lineAlphas[vi + 1] = alpha;
          lineIdx++;
          connectionsThisParticle++;
        }
      }
    }
  }

  // Clear remaining
  for (let i = lineIdx; i < CONFIG.maxConnections; i++) {
    const vi = i * 2;
    linePositions[vi * 3] = 0;
    linePositions[vi * 3 + 1] = 0;
    linePositions[vi * 3 + 2] = 0;
    linePositions[(vi + 1) * 3] = 0;
    linePositions[(vi + 1) * 3 + 1] = 0;
    linePositions[(vi + 1) * 3 + 2] = 0;
    lineAlphas[vi] = 0;
    lineAlphas[vi + 1] = 0;
  }

  lineGeometry.attributes.position.needsUpdate = true;
  lineGeometry.attributes.aLineAlpha.needsUpdate = true;
  lineGeometry.setDrawRange(0, lineIdx * 2);
}

// ---- Easing Functions ----

function easeInQuad(t) { return t * t; }
function easeOutQuad(t) { return t * (2 - t); }
function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

// ---- Animation Loop ----

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05); // cap delta
  const time = clock.getElapsedTime();

  updateTextures(dt);
  updateLightningEvents(dt);
  updateTurbulenceZones(dt);
  updateParticles(dt, time);

  renderer.render(scene, camera);
}

// ---- Resize ----

function onResize() {
  const container = document.getElementById('canvas-container');
  width = container.clientWidth;
  height = container.clientHeight;

  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  renderer.setSize(width, height);
  material.uniforms.uResolution.value.set(width, height);
}

// ---- API Integration ----

async function analyzeConversation(text) {
  const apiKey = document.getElementById('api-key-input').value.trim();
  if (!apiKey) {
    alert('Please enter your Anthropic API key');
    return null;
  }

  isAnalyzing = true;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 1000,
        system: TESSERA_ENGINE_PROMPT,
        messages: [
          { role: "user", content: text }
        ]
      })
    });

    if (!response.ok) {
      const err = await response.text();
      console.error('API error:', err);
      isAnalyzing = false;
      return null;
    }

    const data = await response.json();
    const textContent = data.content.find(b => b.type === "text")?.text || "{}";
    const cleaned = textContent.replace(/```json|```/g, "").trim();
    const result = JSON.parse(cleaned);

    isAnalyzing = false;
    return result;
  } catch (e) {
    console.error('Analysis failed:', e);
    isAnalyzing = false;
    return null;
  }
}

// ---- UI ----

let uiCollapsed = false;

function toggleUI() {
  uiCollapsed = !uiCollapsed;
  const overlay = document.getElementById('ui-overlay');
  const btn = document.getElementById('toggle-btn');
  if (uiCollapsed) {
    overlay.classList.add('collapsed');
    btn.innerHTML = '&#9652;';
  } else {
    overlay.classList.remove('collapsed');
    btn.innerHTML = '&#9662;';
  }
}

async function witness() {
  const input = document.getElementById('conversation-input');
  const text = input.value.trim();
  if (!text) return;

  const btn = document.getElementById('witness-btn');
  btn.disabled = true;
  btn.textContent = '...';

  const result = await analyzeConversation(text);

  if (result && result.textures) {
    // Store current cymatic config for folding memory
    if (foldingMemory.length >= 3) foldingMemory.shift();
    foldingMemory.push({ ...currentCymaticConfig });

    // Apply textures
    targetTextures = { ...defaultTextures, ...result.textures };
    confidence = result.confidence || 0.5;
    lastInputTime = Date.now();

    // Reset lightning triggers for new analysis
    arrivalTriggered = false;
    heartMemoryTriggered = false;

    // Collapse input
    if (!uiCollapsed) toggleUI();
  }

  btn.disabled = false;
  btn.textContent = 'witness';
}

// Save API key to localStorage
document.addEventListener('DOMContentLoaded', () => {
  const keyInput = document.getElementById('api-key-input');
  const saved = localStorage.getItem('tessera_api_key');
  if (saved) keyInput.value = saved;
  keyInput.addEventListener('change', () => {
    localStorage.setItem('tessera_api_key', keyInput.value);
  });
});

// ---- Init ----
window.addEventListener('load', init);
</script>
